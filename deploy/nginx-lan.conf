# ===================================================
# Nginx — longnhx.duckdns.org (HTTPS)
# ===================================================

# ---- HTTPS Server ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 192.168.1.106 longnhx.duckdns.org longn.dev www.longn.dev _;

    root /var/www/longn.dev;
    index index.html;

    # ---- SSL (Let's Encrypt) ----
    ssl_certificate /etc/letsencrypt/live/longnhx.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/longnhx.duckdns.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ---- Security Headers ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ---- Gzip ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # ---- Static files caching ----
    location /_next/static/ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location /images/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # ---- Dashboard protection ----
    location /dashboard {
        auth_basic "Dashboard — Restricted Area";
        auth_basic_user_file /etc/nginx/.htpasswd-dashboard;
        try_files $uri $uri.html $uri/index.html =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ---- Pages ----
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    location ~ /\.(env|git|htaccess|htpasswd|md|json|lock) {
        deny all;
    }

    error_page 404 /404.html;
}

# ---- HTTP → HTTPS Redirect ----
server {
    listen 80;
    listen [::]:80;
    server_name longnhx.duckdns.org;
    return 301 https://$server_name$request_uri;
}

# ---- HTTP fallback (other hosts) ----
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 404;
}
