# ===================================================
# Nginx Config cho VPS LAN (192.168.1.106)
# Serve HTML tĩnh từ thư mục đồng bộ qua Syncthing
# ===================================================

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _; # Bắt mọi request đến IP này

    # ---- Document Root (Thư mục out được Syncthing đồng bộ qua) ----
    root /home/eve/Documents/myweb/frontend/out;
    index index.html;

    # ---- Security Headers ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # ---- Gzip ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ---- Rate Limiting (Tắt tạm thời cho mạng LAN để dễ test) ----
    # limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

    # ---- Static files caching ----
    location /_next/static/ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location /images/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # ---- Pages ----
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # ---- Custom 404 ----
    error_page 404 /404.html;
}
