# ===================================================
# Nginx Config cho longn.dev (Static Site)
# Serve HTML tĩnh từ thư mục out/ — không cần Node.js runtime
# ===================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name longn.dev www.longn.dev;
    return 301 https://$server_name$request_uri;
}

# HTTPS Server
server {
    listen 443 ssl http2;
    server_name longn.dev www.longn.dev;

    # ---- Document Root (thư mục chứa HTML đã build) ----
    root /home/eve/Documents/myweb/frontend/out;
    index index.html;

    # ---- SSL (Let's Encrypt) ----
    ssl_certificate /etc/letsencrypt/live/longn.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/longn.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ---- Security Headers ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:;" always;

    # ---- Gzip ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ---- Rate Limiting ----
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

    # ---- Static files caching ----
    location /_next/static/ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location /images/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # ---- Pages ----
    location / {
        limit_req zone=general burst=40 nodelay;
        try_files $uri $uri.html $uri/index.html =404;
    }

    # ---- Custom 404 ----
    error_page 404 /404.html;
}
